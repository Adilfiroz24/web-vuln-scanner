<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Hardening Audit Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .report-card {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: #2d3748;
            color: white;
            padding: 30px 40px;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: "🛡️";
            font-size: 1.2em;
        }

        .timestamp {
            font-size: 0.95em;
            opacity: 0.8;
            margin-top: 5px;
        }

        .content {
            padding: 40px;
        }

        .summary {
            background: #f7fafc;
            border-left: 5px solid #4299e1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .summary p {
            color: #2d3748;
            font-size: 1.1em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        th {
            background: #4a5568;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 16px 20px;
            text-align: left;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f8f9fa;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .badge-PASS {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .badge-FAIL {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #feb2b2;
        }

        .badge-WARN {
            background: #feebc8;
            color: #7b341e;
            border: 1px solid #fbd38d;
        }

        .message {
            color: #2d3748;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
        }

        .footer {
            background: #edf2f7;
            padding: 20px 40px;
            text-align: center;
            color: #718096;
            font-size: 0.9em;
            border-top: 1px solid #e2e8f0;
        }

        .footer a {
            color: #4a5568;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .content { padding: 20px; }
            th, td { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="report-card">
        <div class="header">
            <h1>Linux Hardening Audit Report</h1>
            <div class="timestamp">Generated: {{timestamp}}</div>
        </div>

        <div class="content">
            <div class="summary">
                <p>✅ This report summarizes the security posture of the system based on key hardening checks (SSH, firewall, file permissions, services).</p>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Check</th>
                        <th>Status</th>
                        <th>Message</th>
                    </tr>
                </thead>
                <tbody>
                    {{rows}}
                </tbody>
            </table>
        </div>

        <div class="footer">
            <p>🔒 Linux Hardening Audit Tool • CIS Benchmark Inspired • <a href="#">View Documentation</a></p>
        </div>
    </div>
</body>
</html>
